services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paadi
      POSTGRES_PASSWORD: paadi
      POSTGRES_DB: paadi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paadi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: node apps/api/dist/main.js
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://paadi:paadi@postgres:5432/paadi
      REDIS_URL: redis://redis:6379
      API_PORT: "3001"
      SENDCHAMP_DRIVER: console
      DOJAH_DRIVER: mock
      GOOGLE_DRIVER: mock
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: node apps/api/dist/worker.js
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://paadi:paadi@postgres:5432/paadi
      REDIS_URL: redis://redis:6379
      SENDCHAMP_DRIVER: console
      DOJAH_DRIVER: mock
      GOOGLE_DRIVER: mock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
